<!DOCTYPE html>
<html lang="hu">
 <head>

    <meta charset="UTF-8">
    <title>OOJS</title>

    <style>

        body{
            font-family: Arial;
            text-align: center;
            background: #f5f5f500;
        }

        button {
            padding: 10px 20px;
            margin: 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #container 
        {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .kartya {
            
            width: 220px;
            height: 150px;
            perspective: 1000px;
            margin: 10px;
           
        }

        .belso 
        {
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
            
        }

        .kartya.flip .belso
        {
            transform:rotateY(180deg);
        }

        .oldal
        {
            position:absolute;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            backface-visibility: hidden;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.555);
            padding: 10px;
            box-sizing: border-box;
            color: rgb(255, 255, 255);
        }

        .elol
        {
             background: linear-gradient(135deg, #fe4f4f, #00f2fe);
        }

        .hatul
        {
           background: linear-gradient(black, #e94343, #38f9d7);
            transform: rotateY(180deg);
        }

         .kartya:hover {
            transform: scale(1.1);
        }
 </style>
</head>

<body>

<h1>Pilóták</h1>

<button onclick="betolt()">Kártyák betöltése</button>

<div id="container"></div>

<script src="oojs_menu/oojs.js"></script>

</body>
</html>
